video_synthesis:
  id: synthesis
  section_title: "Robotics-Driven High-Throughput Catalyst Synthesis"
  cards:
    - video_src: "videos/1-0.mp4"
      title: "AI Agent-Assisted System Orchestration"
      text: "AI-Driven Robotic Control Workflow with OpenClaw"

    - video_src: "videos/1.mp4"
      title: "Automated synthesis of the MOF-74 support"
      text: "Automated synthesis"

    - video_src: "videos/2.mp4"
      title: "Automated synthesis of the heterometallic La–Ce complex precursor"
      text: "Automated synthesis"

    - video_src: "videos/3.mp4"
      title: "Host–guest encapsulation"
      text: "AI-controlled robotic arm precisely assembles host–guest structures for catalyst design"

    - video_src: "videos/4.mp4"
      title: "Autonomous sample transfer"
      text: "Robotic Arm + AGV workflow for Opentronssample transfer"

    - video_src: "videos/5.mp4"
      title: "Programmable spatial calcination"
      text: "Robotic high-temperature calcination workflow for catalyst synthesis"


